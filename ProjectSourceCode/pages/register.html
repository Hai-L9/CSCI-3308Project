<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }

    .form-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    form {
      background: white;
      padding: 2rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    h2 { margin: 0 0 4px; font-size: 1.2rem; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }

    input:focus { outline: 2px solid #555; border-color: transparent; }

    button[type="submit"] {
      padding: 9px;
      background: #222;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }

    button[type="submit"]:hover { background: #444; }

    .error, .success {
      color: #c00;
      font-size: 12px;
      display: none;
    }

    .success { color: #080; }

    .link {
      font-size: 12px;
      text-align: center;
      margin-top: 8px;
    }

    .link a {
      color: #0066cc;
      text-decoration: none;
    }

    .link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div data-app-navbar></div>

  <div class="form-wrapper">
    <form id="registerForm">
      <h2>Register</h2>

      <div class="field">
        <input type="text" id="username" placeholder="Username" autocomplete="username" required />
        <div class="error" id="usernameError">Please enter a username.</div>
      </div>

      <div class="field">
        <input type="email" id="email" placeholder="Email" autocomplete="email" required />
        <div class="error" id="emailError">Please enter a valid email.</div>
      </div>

      <div class="field">
        <input type="password" id="password" placeholder="Password" autocomplete="new-password" required />
        <div class="error" id="passwordError">Please enter your password.</div>
      </div>

      <div class="error" id="apiError">Registration failed. Please try again.</div>
      <div class="success" id="apiSuccess">Success! Redirecting...</div>

      <button type="submit" id="submitBtn">Sign up</button>

      <div class="link">
        Already have an account? <a href="/?login=1" data-login-trigger>Log in here</a>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <script src="../scripts/navbar.js"></script>
  <script src="../scripts/register.js"></script>
</body>
</html>
