<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Task Map | Task Tracker 0.0.2</title>
    <meta name="description" content="Map dashboard for viewing task locations by status and priority." />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      #taskMapDashboard {
        height: min(68vh, 42rem);
        min-height: 28rem;
        border: 1px solid #dee2e6;
        border-radius: 0.375rem;
      }

      .map-task-list {
        max-height: min(68vh, 42rem);
        overflow-y: auto;
      }

      .map-task-item {
        cursor: pointer;
      }

      .map-task-item:hover {
        background: var(--bs-tertiary-bg);
      }
    </style>
  </head>
  <body class="bg-light text-dark">
    <div data-app-navbar></div>

    <main class="py-4 py-lg-5">
      <div class="container">
        <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 mb-4">
          <div>
            <h1 class="h2 mb-1">Task Map</h1>
            <p class="text-secondary mb-0">View mapped work by status, priority, and worksite.</p>
          </div>
          <div class="d-flex align-items-center gap-2">
            <span class="badge text-bg-secondary" id="mapVisibleCount">0 visible</span>
            <button type="button" class="btn btn-outline-primary btn-sm" id="mapRefreshBtn">Refresh</button>
          </div>
        </div>

        <section class="card shadow-sm mb-4">
          <div class="card-body">
            <div class="row g-3 align-items-end">
              <div class="col-12 col-lg-4">
                <label for="mapSearchInput" class="form-label">Search</label>
                <input type="search" class="form-control" id="mapSearchInput" placeholder="Task, assignee, or worksite" />
              </div>
              <div class="col-12 col-md-6 col-lg-3">
                <label for="mapPriorityFilter" class="form-label">Priority</label>
                <select class="form-select" id="mapPriorityFilter">
                  <option value="all">All priorities</option>
                  <option value="high">High</option>
                  <option value="medium">Medium</option>
                  <option value="low">Low</option>
                </select>
              </div>
              <div class="col-12 col-lg-5">
                <div class="form-label">Status</div>
                <div class="d-flex flex-wrap gap-2">
                  <input class="btn-check" type="checkbox" id="statusBacklog" value="backlog" checked />
                  <label class="btn btn-outline-secondary btn-sm" for="statusBacklog">Backlog</label>

                  <input class="btn-check" type="checkbox" id="statusInProgress" value="in-progress" checked />
                  <label class="btn btn-outline-primary btn-sm" for="statusInProgress">In Progress</label>

                  <input class="btn-check" type="checkbox" id="statusReview" value="review" checked />
                  <label class="btn btn-outline-warning btn-sm" for="statusReview">Review</label>

                  <input class="btn-check" type="checkbox" id="statusDone" value="done" checked />
                  <label class="btn btn-outline-success btn-sm" for="statusDone">Done</label>
                </div>
              </div>
            </div>
          </div>
        </section>

        <div class="row g-4">
          <div class="col-12 col-xl-8">
            <div id="taskMapDashboard" role="region" aria-label="Task location map"></div>
          </div>
          <div class="col-12 col-xl-4">
            <div class="card shadow-sm h-100">
              <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h2 class="h6 mb-0">Mapped Tasks</h2>
                <span class="text-secondary small" id="mapTotalCount">0 total</span>
              </div>
              <div class="list-group list-group-flush map-task-list" id="mapTaskList">
                <div class="list-group-item text-secondary">Loading mapped tasks...</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="toastContainer" aria-live="polite">
      <div id="errorToast" class="toast align-items-center text-bg-danger border-0 position-fixed bottom-0 end-0 m-3" role="alert">
        <div class="d-flex">
          <div class="toast-body" id="toastMessage">An error occurred.</div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="../scripts/navbar.js"></script>
    <script src="../scripts/map.js"></script>
    <script src="../scripts/task-map-dashboard.js"></script>
    <script src="../scripts/notifications.js"></script>
    <script src="../scripts/chatbot.js"></script>
  </body>
</html>
